app = "mediafetch-bot"
primary_region = "sin"      # Singapore — change to your preferred region

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  MONGO_DB = "mediafetch"
  PING_INTERVAL = "280"

[[services]]
  protocol = "tcp"
  internal_port = 8080
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 25

  [[services.http_checks]]
    interval = "30s"
    timeout  = "10s"
    grace_period = "20s"
    method   = "GET"
    path     = "/ping"

[mounts]
  # Persistent volume for tmp/ and logs/ so files survive restarts
  # Create with: fly volumes create mediafetch_data --size 1
  # Then uncomment:
  # source = "mediafetch_data"
  # destination = "/app/tmp"
