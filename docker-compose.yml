version: "3.9"

services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./tmp:/app/tmp
      - ./logs:/app/logs
    environment:
      # Override these in .env — listed here as documentation
      # MONGO_URI defaults to the local mongo service below
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=mediafetch
      # No APP_URL needed — self-ping is disabled on VPS/local
      - APP_URL=
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
